name: Deploy to FTPS

on:
  push:
    branches:
      - main
  # Allow manual triggering
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to FTPS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sync files via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTPS_SERVER }}
          username: ${{ secrets.FTPS_USERNAME }}
          password: ${{ secrets.FTPS_PASSWORD }}
          protocol: ftps
          # Optional: You can specify a local and remote directory. 
          # local-dir: ./ 
          # server-dir: /public_html/
          
          # Optional: Exclude certain files like git folders or documentation
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            Documentation/**
