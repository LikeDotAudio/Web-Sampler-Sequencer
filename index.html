    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: var(--bg, #1b1d22);
            color: var(--text, #d7dce3);
            font-family: "Segoe UI", system-ui, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #root {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Variables extracted from user's mixer */
        :root {
            --bg: #1b1c1e;
            --panel: #242528;
            --strip: #2b2b2e;
            --accent: #f4902c;
            --text: #e8e8e8;
            --muted: #888a8d;
            --on: #f4902c;
            --solo: #ffb44d;
        }

        #app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        .flex-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // --- Standalone Mocks for MQTT environment ---

        const globalStore = {};
        const globalListeners = {};
        
        window.useMqttState = function(topic, defaultState) {
            if (!(topic in globalStore)) {
                globalStore[topic] = defaultState;
            }
            const [state, setState] = React.useState(globalStore[topic]);
            
            React.useEffect(() => {
                if (!globalListeners[topic]) {
                    globalListeners[topic] = new Set();
                }
                const listener = (newVal) => setState(newVal);
                globalListeners[topic].add(listener);
                return () => globalListeners[topic].delete(listener);
            }, [topic]);

            const setGlobalState = React.useCallback((newVal) => {
                const nextVal = typeof newVal === 'function' ? newVal(globalStore[topic]) : newVal;
                globalStore[topic] = nextVal;
                if (globalListeners[topic]) {
                    globalListeners[topic].forEach(l => l(nextVal));
                }
            }, [topic]);

            return [state, setGlobalState];
        };

        // useMqttMessages: returns empty map, used for remembering samples
        window.useMqttMessages = function() {
            return {};
        };

        // useMqttPublish: no-op since there's no MQTT broker
        window.useMqttPublish = function() {
            return function(topic, payload) {
                console.log('Mock publish:', topic, payload);
            };
        };
    </script>

    <script type="text/babel">
        // --- Mock Components for Knob and OcaButton ---
        
        window.Knob = function Knob({ value, onChange, size, config }) {
            const min = config?.min ?? 0;
            const max = config?.max ?? 100;
            const step = config?.step ?? 1;
            const sz = size || 60;
            
            // A simple range input styled to look reasonably compact
            return (
                <input 
                    type="range" 
                    value={value}
                    min={min}
                    max={max}
                    step={step}
                    onChange={(e) => onChange(Number(e.target.value))}
                    style={{ 
                        width: `${sz}px`, 
                        accentColor: config?.indicator_color || '#f4902c',
                        margin: '5px 0'
                    }}
                />
            );
        };

        window.OcaButton = function OcaButton({ label, onClick, title, disabled, color, style }) {
            const defaultStyle = {
                backgroundColor: color || '#333',
                color: '#fff',
                border: 'none',
                cursor: disabled ? 'default' : 'pointer',
                opacity: disabled ? 0.5 : 1,
                ...style
            };
            return (
                <button onClick={onClick} title={title} disabled={disabled} style={defaultStyle}>
                    {label}
                </button>
            );
        };
    </script>

    <!-- App files -->
    <script type="text/babel" data-type="module" src="./libControl/Header/Header.jsx"></script>
    <script type="text/babel" data-type="module" src="./libControl/Footer/Footer.jsx"></script>

    <!-- Mount App -->
    <script type="text/babel">
        function App() {
            const [activeTabs, setActiveTabs] = React.useState(['SEQ']); // default
            
            const toggleTab = (tab) => {
                setActiveTabs(prev => {
                    if (prev.includes(tab)) {
                        if (prev.length === 1) return prev; // Keep at least one open
                        return prev.filter(t => t !== tab);
                    }
                    return [...prev, tab];
                });
            };
            
            return (
                <div id="app-container">
                    {window.Header ? <window.Header activeTabs={activeTabs} toggleTab={toggleTab} /> : <header>Loading HEADER...</header>}
                    
                    <main style={{ flex: 1, overflowY: 'auto', padding: '10px 20px', display: 'flex', flexDirection: 'column', gap: '10px' }}>
                        <div style={{ display: activeTabs.includes('PADS') ? 'flex' : 'none', flex: 1, width: '100%', justifyContent: 'center', minHeight: '300px' }}>
                            {window.Pads ? <window.Pads /> : <div>Loading PADS...</div>}
                        </div>
                        {activeTabs.includes('PADS') && activeTabs.length > 1 && <hr style={{width: '100%', borderColor: '#333'}}/>}
                        
                        <div style={{ display: activeTabs.includes('SEQ') ? 'block' : 'none', flex: 1, width: '100%', minHeight: '300px' }}>
                            {window.Sequencer ? <window.Sequencer /> : <div>Loading SEQ...</div>}
                        </div>
                        {activeTabs.includes('SEQ') && activeTabs.length > 1 && (activeTabs.includes('EDITOR') || activeTabs.includes('MIXER')) && <hr style={{width: '100%', borderColor: '#333'}}/>}
                        
                        <div style={{ display: activeTabs.includes('EDITOR') ? 'flex' : 'none', flex: 1, width: '100%', justifyContent: 'center', alignItems: 'center', minHeight: '300px' }}>
                            {window.SoundBrowser ? <window.SoundBrowser inline={true} onClose={() => toggleTab('EDITOR')} /> : <div>Loading EDITOR...</div>}
                        </div>
                        {activeTabs.includes('EDITOR') && activeTabs.length > 1 && activeTabs.includes('MIXER') && <hr style={{width: '100%', borderColor: '#333'}}/>}
                        
                        <div style={{ display: activeTabs.includes('MIXER') ? 'block' : 'none', flex: 1, width: '100%', minHeight: '300px' }}>
                            {window.Mixer ? <window.Mixer /> : <div>Loading MIXER...</div>}
                        </div>
                    </main>

                    {window.Footer ? <window.Footer /> : null}
                </div>
            );
        }

        // Wait a tick for Babel to process the external scripts before rendering
        setTimeout(() => {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        }, 500);
    </script>
</body>
