<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Sampler & Sequencer</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: var(--bg, #1b1d22);
            color: var(--text, #d7dce3);
            font-family: "Segoe UI", system-ui, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Variables extracted from user's mixer */
        :root {
            --bg: #1b1c1e;
            --panel: #242528;
            --strip: #2b2b2e;
            --accent: #f4902c;
            --text: #e8e8e8;
            --muted: #888a8d;
            --on: #f4902c;
            --solo: #ffb44d;
        }

        #app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        .flex-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // --- Standalone Mocks for MQTT environment ---

        const globalStore = {};
        const globalListeners = {};
        
        window.useMqttState = function(topic, defaultState) {
            if (!(topic in globalStore)) {
                globalStore[topic] = defaultState;
            }
            const [state, setState] = React.useState(globalStore[topic]);
            
            React.useEffect(() => {
                if (!globalListeners[topic]) {
                    globalListeners[topic] = new Set();
                }
                const listener = (newVal) => setState(newVal);
                globalListeners[topic].add(listener);
                return () => globalListeners[topic].delete(listener);
            }, [topic]);

            const setGlobalState = React.useCallback((newVal) => {
                const nextVal = typeof newVal === 'function' ? newVal(globalStore[topic]) : newVal;
                globalStore[topic] = nextVal;
                if (globalListeners[topic]) {
                    globalListeners[topic].forEach(l => l(nextVal));
                }
            }, [topic]);

            return [state, setGlobalState];
        };

        // useMqttMessages: returns empty map, used for remembering samples
        window.useMqttMessages = function() {
            return {};
        };

        // useMqttPublish: no-op since there's no MQTT broker
        window.useMqttPublish = function() {
            return function(topic, payload) {
                console.log('Mock publish:', topic, payload);
            };
        };
    </script>

    <script type="text/babel">
        // --- Mock Components for Knob and OcaButton ---
        
        window.Knob = function Knob({ value, onChange, size, config }) {
            const min = config?.min ?? 0;
            const max = config?.max ?? 100;
            const step = config?.step ?? 1;
            const sz = size || 60;
            
            // A simple range input styled to look reasonably compact
            return (
                <input 
                    type="range" 
                    value={value}
                    min={min}
                    max={max}
                    step={step}
                    onChange={(e) => onChange(Number(e.target.value))}
                    style={{ 
                        width: `${sz}px`, 
                        accentColor: config?.indicator_color || '#f4902c',
                        margin: '5px 0'
                    }}
                />
            );
        };

        window.OcaButton = function OcaButton({ label, onClick, title, disabled, color, style }) {
            const defaultStyle = {
                backgroundColor: color || '#333',
                color: '#fff',
                border: 'none',
                cursor: disabled ? 'default' : 'pointer',
                opacity: disabled ? 0.5 : 1,
                ...style
            };
            return (
                <button onClick={onClick} title={title} disabled={disabled} style={defaultStyle}>
                    {label}
                </button>
            );
        };
    </script>

    <!-- App files -->
    <script src="./libControl/SamplerDrumkit/oaDrumkitAudio.js"></script>
    <script src="./libControl/SamplerDrumkit/oaDrumkitStorage.js"></script>
    <script src="./libControl/SamplerDrumkit/oaDrumkitSynth.js"></script>
    <script src="./libControl/SamplerDrumkit/SamplerDrumkit.js"></script>

    <script src="./libControl/Sampler/useSamplerSets.js"></script>

    <script src="./libControl/Sampler/useMidiPads.js"></script>
    <script src="./libControl/Sampler/useKeyboardPads.js"></script>
    <script type="text/babel" data-type="module" src="./libControl/Sampler/Sampler.jsx"></script>
    <script type="text/babel" data-type="module" src="./libControl/SamplerSequencer/SeqKnob.jsx"></script>
    <script type="text/babel" data-type="module" src="./libControl/SamplerSequencer/SeqButton.jsx"></script>

    <script src="./libControl/SamplerSequencer/useSeqLibrary.js"></script>
    <script src="./libControl/SamplerSequencer/useSeqScheduler.js"></script>
    <script src="./libControl/SamplerSequencer/useSeqRenderer.js"></script>
    <script type="text/babel" data-type="module" src="./libControl/SamplerSequencer/SeqToneTrack.jsx"></script>
    <script type="text/babel" data-type="module" src="./libControl/SamplerSequencer/SeqTrack.jsx"></script>

    <script type="text/babel" data-type="module" src="./libControl/SamplerSequencer/SeqLibrary.jsx"></script>
    <script type="text/babel" data-type="module" src="./libControl/SamplerSequencer/SeqSong.jsx"></script>
    <script type="text/babel" data-type="module" src="./libControl/SamplerSequencer/SeqFader.jsx"></script>
    <script type="text/babel" data-type="module" src="./libControl/SamplerSequencer/TrackSampleMenu.jsx"></script>

    <script type="text/babel" data-type="module" src="./libControl/SamplerSoundBrowse/SoundCloudView.jsx"></script>
    <script src="./libControl/SamplerSoundBrowse/gatherAll.js"></script>
    <script src="./libControl/SamplerSoundBrowse/gatherMatching.js"></script>
    <script src="./libControl/SamplerSoundBrowse/makeChipBuilder.js"></script>
    <script type="text/babel" data-type="module" src="./libControl/SamplerSoundBrowse/SoundFolderNode.jsx"></script>
    <script src="./libControl/SamplerSoundBrowse/useSoundBrowseState.js"></script>
    <script src="./libControl/SamplerSoundBrowse/useSoundBrowseAudio.js"></script>
    <script src="./libControl/SamplerSoundBrowse/useSoundBrowseKeys.js"></script>
    <script type="text/babel" data-type="module" src="./libControl/SamplerSoundBrowse/SamplerSoundBrowse.jsx"></script>

    <!-- Mount App -->
    <script type="text/babel">
        function App() {
            const [activeTab, setActiveTab] = React.useState('SEQ'); // default
            
            const btnStyle = (tab) => ({
                padding: '8px 16px',
                background: activeTab === tab ? 'var(--accent)' : 'var(--strip)',
                color: activeTab === tab ? '#06222e' : 'var(--text)',
                border: '1px solid #3a3f49',
                borderRadius: '6px',
                cursor: 'pointer',
                fontWeight: '600',
                fontSize: '14px'
            });

            return (
                <div id="app-container">
                    <header style={{ 
                        display: 'flex', alignItems: 'center', gap: '14px',
                        padding: '10px 16px', background: 'var(--panel)',
                        boxShadow: '0 2px 8px #0006', zIndex: 10, flexWrap: 'wrap',
                        justifyContent: 'space-between'
                    }}>
                        <h1 style={{ fontSize: '18px', margin: 0, fontWeight: 600, letterSpacing: '2px', color: 'var(--accent)' }}>SAMPLER.LIKE.AUDIO</h1>
                        
                        <div style={{ display: 'flex', gap: '8px' }}>
                            <button onClick={() => setActiveTab('PADS')} style={btnStyle('PADS')}>PADS</button>
                            <button onClick={() => setActiveTab('SEQ')} style={btnStyle('SEQ')}>SEQ</button>
                            <button onClick={() => setActiveTab('EDITOR')} style={btnStyle('EDITOR')}>EDITOR</button>
                            <button onClick={() => setActiveTab('MIXER')} style={btnStyle('MIXER')}>MIXER</button>
                        </div>
                    </header>
                    
                    <main style={{ flex: 1, overflowY: 'auto', padding: '20px', display: 'flex', flexDirection: 'column' }}>
                        <div style={{ display: activeTab === 'PADS' ? 'flex' : 'none', width: '100%', justifyContent: 'center' }}>
                            {window.Sampler ? <window.Sampler /> : <div>Loading PADS...</div>}
                        </div>
                        <div style={{ display: activeTab === 'SEQ' ? 'block' : 'none', width: '100%' }}>
                            {window.Sequencer ? <window.Sequencer /> : <div>Loading SEQ...</div>}
                        </div>
                        <div style={{ display: activeTab === 'EDITOR' ? 'flex' : 'none', width: '100%', height: '100%', justifyContent: 'center', alignItems: 'center' }}>
                            {window.SoundBrowse ? <window.SoundBrowse inline={true} onClose={() => setActiveTab('SEQ')} /> : <div>Loading EDITOR...</div>}
                        </div>
                        <div style={{ display: activeTab === 'MIXER' ? 'block' : 'none', width: '100%', height: '100%' }}>
                            {window.Mixer ? <window.Mixer /> : <div>Loading MIXER...</div>}
                        </div>
                    </main>

                    <footer style={{ padding: '10px', backgroundColor: 'var(--panel)', borderTop: '1px solid #3a3f49', textAlign: 'center', fontSize: '12px', color: 'var(--muted)' }}>
                        Created by Anthony Kuzub — for educational and experimental purposes
                    </footer>
                </div>
            );
        }

        // Wait a tick for Babel to process the external scripts before rendering
        setTimeout(() => {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        }, 500);
    </script>
</body>
</html>
