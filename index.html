<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Sampler & Sequencer</title>
    
    <!-- React & ReactDOM -->
    <script src="./vendor/react.production.min.js"></script>
    <script src="./vendor/react-dom.production.min.js"></script>
    

    <!-- Progressive Web App Settings -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#f4902c">
    <link rel="icon" href="./ICON and LOGO/favicon.ico">
    <link rel="apple-touch-icon" href="./ICON and LOGO/icon-192.png">
    <link rel="apple-touch-startup-image" href="./ICON and LOGO/splash.png">

    <style>
        body {
            background-color: var(--bg, #1b1d22);
            color: var(--text, #d7dce3);
            font-family: "Segoe UI", system-ui, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow: hidden;
        }

        #root {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Variables extracted from user's mixer */
        :root {
            --bg: #1b1c1e;
            --panel: #242528;
            --strip: #2b2b2e;
            --accent: #f4902c;
            --text: #e8e8e8;
            --muted: #888a8d;
            --on: #f4902c;
            --solo: #ffb44d;
        }

        #app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        .flex-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .chunky-scrollbar::-webkit-scrollbar {
            height: 56px;
        }
        .chunky-scrollbar::-webkit-scrollbar-track {
            background-color: #1a1c1e;
            border: 2px solid #000;
            border-radius: 6px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
            margin: 4px;
        }
        .chunky-scrollbar::-webkit-scrollbar-thumb {
            background-color: var(--accent);
            border: 2px solid #000;
            border-radius: 4px;
            box-shadow: inset 0 2px 2px rgba(255,255,255,0.3), inset 0 -2px 2px rgba(0,0,0,0.3);
            background-image: linear-gradient(90deg, 
                transparent 40%, rgba(0,0,0,0.8) 40%, rgba(0,0,0,0.8) 60%, transparent 60%
            );
            cursor: pointer;
        }
        .chunky-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: #ffd494;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Mount App -->
    <!-- Everything: 53 sources compiled ahead of time by build.mjs -->
    <script src="./dist/app.js"></script>
</body>
</html>
